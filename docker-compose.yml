version: '3.9'

services:
  postgres:
    image: postgres:15
    container_name: car_service_postgres
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  django:
    build:
      context: .
      dockerfile: ./docker/django/Dockerfile
    container_name: car_service_backend
    command: sh -c "python manage.py migrate && gunicorn config.wsgi:application --bind 0.0.0.0:8000"
    volumes:
      - ./backend/django_app:/app
    env_file: .env
    depends_on:
      - postgres
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    container_name: car_service_frontend
    command: gunicorn app:app --bind 0.0.0.0:3000
    env_file: .env
    depends_on:
      - django
    ports:
      - "3000:3000"

volumes:
  postgres_data:
