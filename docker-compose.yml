version: '3.9'

services:
  frontend:
    build: ./frontend
    container_name: car_service_frontend
    ports:
      - "3000:3000"
    networks:
      - car_service_network
  postgres:
    image: postgres:15
    container_name: car_service_postgres
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - car_service_network

  django:
    build: 
      context: .
      dockerfile: ./docker/django/Dockerfile
    container_name: car_service_django
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - ./backend/django_app:/app
    env_file: .env
    depends_on:
      - postgres
    networks:
      - car_service_network

  flask:
    build: 
      context: .
      dockerfile: ./docker/flask/Dockerfile
    container_name: car_service_flask
    command: python run.py
    volumes:
      - ./backend/flask_api:/app
    env_file: .env
    depends_on:
      - postgres
    networks:
      - car_service_network
    ports:
      - "5000:5000" 

  nginx:
    image: nginx:latest
    container_name: car_service_nginx
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - django
      - flask
    networks:
      - car_service_network

volumes:
  postgres_data:

networks:
  car_service_network:
    driver: bridge