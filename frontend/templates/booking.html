{% extends "base.html" %}
{% block title %}Book Service | TorqueFlow{% endblock %}
{% block content %}
<section class="header-row">
    <div>
        <span class="eyebrow">Appointment scheduling</span>
        <h1>Create a booking</h1>
        <p>Pick a vehicle, service, staff member, and preferred start time.</p>
    </div>
</section>

<section class="panel form-panel">
    <form method="post" action="/booking" class="booking-grid">
        <label>
            Vehicle
            <select name="vehicle" required>
                <option value="">Select vehicle</option>
                {% for vehicle in vehicles %}
                <option value="{{ vehicle.id }}">{{ vehicle.brand }} {{ vehicle.model }} — {{ vehicle.license_plate }}</option>
                {% endfor %}
            </select>
        </label>

        <label>
            Service
            <select name="service" required>
                <option value="">Select service</option>
                {% for service in services %}
                <option value="{{ service.id }}">{{ service.name }} — {{ service.duration_minutes }} min</option>
                {% endfor %}
            </select>
        </label>

        <label>
            Staff member
            <select name="staff" required>
                <option value="">Select staff member</option>
                {% for member in staff_members %}
                <option value="{{ member.id }}">{{ member.full_name }}</option>
                {% endfor %}
            </select>
        </label>

        <label>
            Start time
            <input type="datetime-local" name="start_time" required>
        </label>

        <button type="submit">Create appointment</button>
    </form>
</section>
{% endblock %}
