worker_processes 1;

events { worker_connections 1024; }

http {
    upstream django {
        server django:8000;
    }

    upstream flask {
        server flask:5000;
    }

    server {
        listen 80;

        # Django admin
        location /admin/ {
            proxy_pass http://django;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Flask API
        location /api/ {
            proxy_pass http://flask;       
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Optional: static files for Django
        location /static/ {
            alias /app/static/;
        }
    }
}