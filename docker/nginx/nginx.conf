events {}

http {
    upstream django {
        server django:8000;
    }

    upstream flask {
        server flask:5000;
    }

    server {
        listen 80;

        location /admin/ {
            proxy_pass http://django;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/ {
            proxy_pass http://flask;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location / {
            return 200 "Car Service Platform API is running";
        }
    }
}